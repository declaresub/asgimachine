name: Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - src/** # the API reference is generated from source docstrings
      - pyproject.toml
      - uv.lock
      - .github/workflows/docs.yml
  pull_request:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - src/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/docs.yml

# Least privilege by default; the deploy job widens scope for itself only.
permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The strict build is the gate: it fails on any broken link or unresolved
  # mkdocstrings cross-reference. Path-filtered (docs/src changes only), so it is
  # NOT wired in as a required status check — a path-filtered check would sit in
  # "Expected" forever and block unrelated PRs.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # Actions are pinned to full commit SHAs (supply-chain hardening).
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history + tags: `uv run mkdocs` builds the editable install, and
          # hatch-vcs derives the version from git. A shallow clone would break that.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
          # No cache in a Pages-publishing workflow (cache-poisoning surface).
          enable-cache: false

      - name: Build (strict)
        run: uv run --group docs mkdocs build --strict

      # Only the main-branch build feeds the Pages deploy.
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  # Publishes the built site to GitHub Pages. Push-to-main only.
  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write # deploy to Pages
      id-token: write # OIDC token the Pages deployment verifies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Serialize deploys so a later run never cancels an in-flight publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
